        // --- 核心 2.5D 平滑鏡頭渲染管線 ---
        function drawScene() {
            if (!ctx || !canvas || !inkCanvas) return; 

            ctx.fillStyle = '#0b0f19';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'playing' && player) {
                let targetCamX = player.x - canvas.width / 2;
                let targetCamY = player.y - canvas.height / 2;

                targetCamX = Math.max(0, Math.min(WORLD_WIDTH - canvas.width, targetCamX));
                targetCamY = Math.max(0, Math.min(WORLD_HEIGHT - canvas.height, targetCamY));

                camX += (targetCamX - camX) * 0.12;
                camY += (targetCamY - camY) * 0.12;
            } else {
                camX = WORLD_WIDTH / 2 - canvas.width / 2;
                camY = WORLD_HEIGHT / 2 - canvas.height / 2;
            }

            // 電影級震屏
            let shakeX = 0;
            let shakeY = 0;
            if (screenShake > 0) {
                shakeX = (Math.random() - 0.5) * screenShake * 1.5;
                shakeY = (Math.random() - 0.5) * screenShake * 1.5;
                screenShake--;
            }

            ctx.save();
            ctx.translate(-camX + shakeX, -camY + shakeY);

            // [世界座標]：背景油漆
            ctx.drawImage(inkCanvas, 0, 0);

            // [世界座標]：2.5D 牆壁障礙物
            obstacles.forEach(w => {
                const wallHeight = 24; 

                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.fillRect(w.x - 4, w.y - 4, w.w + 8, w.h + wallHeight + 4);

                ctx.fillStyle = '#131b2e';
                ctx.fillRect(w.x, w.y, w.w, w.h + wallHeight);

                ctx.fillStyle = '#2f3b52';
                ctx.fillRect(w.x, w.y, w.w, w.h);

                ctx.strokeStyle = '#475673';
                ctx.lineWidth = 1;
                ctx.strokeRect(w.x, w.y, w.w, w.h);
            });

            // [世界座標]：常規子彈
            bullets.forEach(b => {
                ctx.save();
                ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
                ctx.beginPath();
                ctx.arc(b.x, b.y + 11, b.radius * 0.9, 0, Math.PI * 2);
                ctx.fill();

                const bulletGrad = ctx.createRadialGradient(b.x - 2, b.y - 2, 1, b.x, b.y, b.radius);
                bulletGrad.addColorStop(0, '#ffffff');
                bulletGrad.addColorStop(1, b.color);
                ctx.fillStyle = bulletGrad;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // [世界座標]：極光射線
            for (let i = beams.length - 1; i >= 0; i--) {
                const b = beams[i];
                ctx.save();
                ctx.strokeStyle = b.color;
                ctx.shadowColor = b.color;
                ctx.shadowBlur = 18;
                ctx.globalAlpha = b.alpha;
                ctx.lineWidth = 14 * b.alpha;
                ctx.beginPath();
                ctx.moveTo(b.x1, b.y1);
                ctx.lineTo(b.x2, b.y2);
                ctx.stroke();
                ctx.restore();
                
                b.alpha -= 0.07; 
                if (b.alpha <= 0) beams.splice(i, 1);
            }

            // [世界座標]：多重導彈鎖定圈與降落軌跡
            missiles.forEach(m => {
                if (m.launchDelay > 0) return;

                ctx.save();
                const flash = Math.floor(Date.now() / 150) % 2 === 0;
                ctx.strokeStyle = flash ? TEAM_COLORS[m.team] : 'rgba(255,255,255,0.4)';
                ctx.lineWidth = m.isLocked ? 3 : 1.5;
                
                ctx.beginPath();
                ctx.arc(m.lockedX, m.lockedY, 60, 0, Math.PI * 2);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(m.lockedX - 22, m.lockedY);
                ctx.lineTo(m.lockedX + 22, m.lockedY);
                ctx.moveTo(m.lockedX, m.lockedY - 22);
                ctx.lineTo(m.lockedX, m.lockedY + 22);
                ctx.stroke();

                if (m.isLocked) {
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.12)';
                    ctx.beginPath();
                    ctx.arc(m.lockedX, m.lockedY, 60, 0, Math.PI * 2);
                    ctx.fill();

                    const height = (m.timer / 60) * 350; 
                    
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.setLineDash([4, 4]);
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(m.lockedX, m.lockedY);
                    ctx.lineTo(m.lockedX, m.lockedY - height);
                    ctx.stroke();

                    // 火箭本體
                    ctx.fillStyle = TEAM_COLORS[m.team];
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(m.lockedX, m.lockedY - height);
                    ctx.lineTo(m.lockedX - 6, m.lockedY - height - 16);
                    ctx.lineTo(m.lockedX + 6, m.lockedY - height - 16);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    if (gameState === 'playing' && !isPaused && Math.random() < 0.4) {
                        particles.push({
                            x: m.lockedX,
                            y: m.lockedY - height - 18,
                            vx: (Math.random() - 0.5) * 1.5,
                            vy: -Math.random() * 2,
                            radius: 2,
                            color: '#f59e0b',
                            alpha: 1,
                            life: 15
                        });
                    }
                } else {
                    ctx.save();
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.arc(m.lockedX, m.lockedY, 40, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
                ctx.restore();
            });

            // [世界座標]：濺灑粒子
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // [世界座標]：角色 (依 y 軸高度排列渲染)
            const sortedEntities = [...entities].sort((a, b) => a.y - b.y);
            sortedEntities.forEach(ent => ent.draw());

            ctx.restore();
        }

        // --- 模式選擇控制 ---
        function selectMode(mode) {
            currentMode = mode; 
            initAudio();
            document.querySelectorAll('.mode-card').forEach(card => {
                card.classList.remove('border-rose-500', 'text-white');
                card.classList.add('border-transparent', 'text-slate-400');
            });
            const activeCard = document.getElementById(`btn-mode-${mode}`);
            if (activeCard) {
                activeCard.classList.remove('border-transparent', 'text-slate-400');
                activeCard.classList.add('border-rose-500', 'text-white');
            }
        }

        // --- 使用者操作控制映射系統 ---
        function parseControls() {
            if (gameState !== 'playing' || !player || player.isDead || isPaused) return;

            // 大招與硬直狀態下限制一般玩家手動位移
            if (player.sharkRideTimer > 0 || player.sharkExplodeWarning > 0 || player.splashdownTimer > 0) {
                player.vx = 0;
                player.vy = 0;
                if (player.sharkRideTimer > 0) {
                    player.vx = Math.cos(player.sharkRideAngle) * player.baseSpeed * 2.8;
                    player.vy = Math.sin(player.sharkRideAngle) * player.baseSpeed * 2.8;
                }
                return;
            }

            let moveX = 0;
            let moveY = 0;

            if (sticks.left.active) {
                moveX = sticks.left.x;
                moveY = sticks.left.y;
            } else {
                if (keys['w'] || keys['W']) moveY = -1;
                if (keys['s'] || keys['S']) moveY = 1;
                if (keys['a'] || keys['A']) moveX = -1;
                if (keys['d'] || keys['D']) moveX = 1;

                const len = Math.sqrt(moveX * moveX + moveY * moveY);
                if (len > 0) {
                    moveX /= len;
                    moveY /= len;
                }
            }

            player.vx = moveX * player.speed;
            player.vy = moveY * player.speed;

            if (sticks.right.active) {
                const shootAngle = Math.atan2(sticks.right.y, sticks.right.x);
                player.angle = shootAngle;

                if (player.classType === 'rifle' || player.classType === 'tank') {
                    player.fireWeapon(shootAngle);
                } 
                else if (player.classType === 'sniper') {
                    if (player.chargeProgress < 100 && player.shootCooldown === 0) {
                        player.chargeProgress += 1.8;
                        if (player.chargeProgress % 15 < 1) {
                            playSound('sniper_charge');
                        }
                    }
                }
            } else {
                if (player.classType === 'sniper' && player.chargeProgress >= 90) {
                    player.fireWeapon(player.angle);
                    player.chargeProgress = 0;
                } else {
                    player.chargeProgress = 0;
                }
            }

            // 桌上型滑鼠
            if (!sticks.right.active && canvas) {
                const rect = canvas.getBoundingClientRect();
                const mouseCanvasX = mouse.x - rect.left;
                const mouseCanvasY = mouse.y - rect.top;
                
                const mouseWorldX = mouseCanvasX + camX;
                const mouseWorldY = mouseCanvasY + camY;

                const angle = Math.atan2(mouseWorldY - player.y, mouseWorldX - player.x);
                
                if (mouse.isDown) {
                    player.angle = angle;
                    if (player.classType === 'rifle' || player.classType === 'tank') {
                        player.fireWeapon(angle);
                    } else if (player.classType === 'sniper') {
                        if (player.chargeProgress < 100 && player.shootCooldown === 0) {
                            player.chargeProgress += 1.8;
                            if (player.chargeProgress % 15 < 1) {
                                playSound('sniper_charge');
                            }
                        }
                    } else if (player.classType === 'knife') {
                        player.fireWeapon(angle);
                    }
                } else {
                    if (player.classType === 'sniper' && player.chargeProgress >= 90) {
                        player.fireWeapon(angle);
                        player.chargeProgress = 0;
                    }
                }
            }
        }

        // --- 觸控感應安全監聽 ---
        function setupTouchControls() {
            window.addEventListener('touchstart', (e) => {
                if (gameState !== 'playing' || isPaused) return;
                initAudio(); 

                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    const clientX = t.clientX;
                    const clientY = t.clientY;
                    const screenWidth = window.innerWidth;

                    // 避開左上角暫停按鈕
                    if (clientX < 80 && clientY < 80) return;

                    // 左半部分移動搖桿
                    if (clientX < screenWidth / 2 && !sticks.left.active) {
                        sticks.left.active = true;
                        sticks.left.startX = clientX;
                        sticks.left.startY = clientY;
                        sticks.left.curX = clientX;
                        sticks.left.curY = clientY;
                        sticks.left.id = t.identifier;

                        if (sticks.left.element) {
                            sticks.left.element.style.display = 'flex';
                            sticks.left.element.style.left = `${clientX - 60}px`;
                            sticks.left.element.style.top = `${clientY - 60}px`;
                            updateKnob(sticks.left);
                        }
                    }
                    // 右半部分射擊搖桿
                    else if (clientX >= screenWidth / 2 && !sticks.right.active) {
                        // 防誤觸特殊技能按鈕
                        const skillButtonElement = document.getElementById('btn-special');
                        if (skillButtonElement && skillButtonElement.style.display !== 'none') {
                            const btnRect = skillButtonElement.getBoundingClientRect();
                            const pad = 10;
                            if (clientX > btnRect.left - pad && clientX < btnRect.right + pad &&
                                clientY > btnRect.top - pad && clientY < btnRect.bottom + pad) {
                                return; 
                            }
                        }

                        sticks.right.active = true;
                        sticks.right.startX = clientX;
                        sticks.right.startY = clientY;
                        sticks.right.curX = clientX;
                        sticks.right.curY = clientY;
                        sticks.right.id = t.identifier;

                        if (sticks.right.element) {
                            sticks.right.element.style.display = 'flex';
                            sticks.right.element.style.left = `${clientX - 60}px`;
                            sticks.right.element.style.top = `${clientY - 60}px`;
                            updateKnob(sticks.right);
                        }
                    }
                }
            }, { passive: true });

            window.addEventListener('touchmove', (e) => {
                if (gameState !== 'playing' || isPaused) return;
                
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (sticks.left.active && t.identifier === sticks.left.id) {
                        sticks.left.curX = t.clientX;
                        sticks.left.curY = t.clientY;
                        updateKnob(sticks.left);
                    }
                    if (sticks.right.active && t.identifier === sticks.right.id) {
                        sticks.right.curX = t.clientX;
                        sticks.right.curY = t.clientY;
                        updateKnob(sticks.right);
                    }
                }
            }, { passive: true });

            const handleTouchEnd = (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (sticks.left.active && t.identifier === sticks.left.id) {
                        sticks.left.active = false;
                        sticks.left.x = 0;
                        sticks.left.y = 0;
                        if (sticks.left.element) sticks.left.element.style.display = 'none';
                    }
                    if (sticks.right.active && t.identifier === sticks.right.id) {
                        sticks.right.active = false;
                        sticks.right.x = 0;
                        sticks.right.y = 0;
                        if (sticks.right.element) sticks.right.element.style.display = 'none';
                    }
                }
            };

            window.addEventListener('touchend', handleTouchEnd, { passive: true });
            window.addEventListener('touchcancel', handleTouchEnd, { passive: true });
        }

        function updateKnob(stick) {
            if (!stick.element) return;
            const dx = stick.curX - stick.startX;
            const dy = stick.curY - stick.startY;
            const distVal = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 50; 

            let angle = Math.atan2(dy, dx);
            let activeRadius = Math.min(distVal, maxRadius);

            stick.x = (Math.cos(angle) * activeRadius) / maxRadius;
            stick.y = (Math.sin(angle) * activeRadius) / maxRadius;

            const knob = stick.element.firstElementChild;
            if (knob) {
                const visualX = Math.cos(angle) * activeRadius;
                const visualY = Math.sin(angle) * activeRadius;
                knob.style.transform = `translate(${visualX}px, ${visualY}px)`;
            }
        }

        // --- 鍵盤與滑鼠映射綁定 ---
        function setupDesktopControls() {
            window.addEventListener('keydown', (e) => { 
                keys[e.key] = true; 
                if ((e.key === ' ' || e.key === 'Shift') && player && gameState === 'playing' && !isPaused) {
                    player.useSpecialSkill();
                }
            });
            window.addEventListener('keyup', (e) => { keys[e.key] = false; });
            
            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            window.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    mouse.isDown = true;
                    initAudio(); 
                }
            });
            window.addEventListener('mouseup', (e) => {
                if (e.button === 0) {
                    mouse.isDown = false;
                }
            });
        }

        function updateRespawnOverlay() {
            if (player && player.isDead) {
                const sec = Math.ceil(player.respawnTimer / 60);
                const timerText = document.getElementById('respawn-timer');
                if (timerText) timerText.innerText = sec;
                
                const circle = document.getElementById('respawn-circle');
                if (circle) {
                    const progress = player.respawnTimer / 180; 
                    circle.style.strokeDashoffset = (251.2 * (1 - progress)).toFixed(1);
                }
            }
        }

        // --- 暫停與離開系統管理模組 ---
        function pauseGame() {
            if (gameState !== 'playing') return;
            initAudio();
            isPaused = true;

            document.getElementById('pause-overlay').classList.remove('hidden');
            document.getElementById('pause-overlay').classList.add('flex');
            document.getElementById('btn-pause').style.display = 'none';

            if (scoreUpdateInterval) clearInterval(scoreUpdateInterval);
        }

        function resumeGame() {
            isPaused = false;
            document.getElementById('pause-overlay').classList.remove('flex');
            document.getElementById('pause-overlay').classList.add('hidden');
            document.getElementById('btn-pause').style.display = 'flex';

            scoreUpdateInterval = setInterval(calculateScores, 500);
        }

        function restartGame() {
            isPaused = false;
            document.getElementById('pause-overlay').classList.remove('flex');
            document.getElementById('pause-overlay').classList.add('hidden');
            document.getElementById('btn-pause').style.display = 'flex';

            startGame(); 
        }

        function leaveGame() {
            isPaused = false;
            gameState = 'lobby';
            document.getElementById('pause-overlay').classList.remove('flex');
            document.getElementById('pause-overlay').classList.add('hidden');
            document.getElementById('btn-pause').style.display = 'flex';

            if (timerInterval) clearInterval(timerInterval);
            if (scoreUpdateInterval) clearInterval(scoreUpdateInterval);

            document.getElementById('lobby-screen').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('lobby-screen').style.opacity = '1';
            }, 50);
            
            drawScene(); 
        }

        // --- 核心遊戲循環 ---
        function updateGame() {
            if (gameState !== 'playing') return;

            if (isPaused) {
                drawScene();
                requestAnimationFrame(updateGame);
                return;
            }

            parseControls();
            entities.forEach(ent => ent.update());
            updateBullets();
            updateMissiles(); 
            updateParticles();
            updateRespawnOverlay();
            updateSkillButtonUI(); 

            // 多人模式：每幀發送玩家輸入到伺服器
            if (isOnline && socket && socket.connected && player && !player.isDead) {
                const moveX = player.vx / (player.speed || 1);
                const moveY = player.vy / (player.speed || 1);
                socket.emit('player_input', {
                    moveX: moveX,
                    moveY: moveY,
                    aimAngle: player.angle || 0,
                    isFiring: mouse.isDown || sticks.right.active,
                    useSkill: false
                });
            }

            drawScene();

            // 多人模式：繪製遠端玩家
            if (isOnline && ctx && Object.keys(remotePlayers).length > 0) {
                for (const [pid, rp] of Object.entries(remotePlayers)) {
                    if (!rp || rp.isDead) continue;
                    const sx = rp.x - camX;
                    const sy = rp.y - camY;
                    ctx.save();
                    ctx.globalAlpha = 0.75;
                    // 根據隊伍繪製圓形
                    ctx.beginPath();
                    ctx.arc(sx, sy, 22, 0, Math.PI * 2);
                    ctx.fillStyle = rp.team === 'red' ? '#f43f5e' : rp.team === 'blue' ? '#06b6d4' : rp.team === 'green' ? '#10b981' : '#f59e0b';
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // 繪製方向指示
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(sx + Math.cos(rp.angle || 0) * 30, sy + Math.sin(rp.angle || 0) * 30);
                    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    // 頭頂顯示名稱
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(rp.name || '未知', sx, sy - 30);
                    // 顯示血量
                    ctx.fillStyle = rp.hp > 50 ? '#4ade80' : rp.hp > 25 ? '#fbbf24' : '#ef4444';
                    ctx.font = '10px sans-serif';
                    ctx.fillText('HP: ' + Math.ceil(rp.hp || 0), sx, sy - 16);
                    ctx.restore();
                }
            }

            requestAnimationFrame(updateGame);
        }

        function selectClass(type) {
            selectedClassType = type;
            initAudio();
            document.querySelectorAll('.class-card').forEach(card => {
                card.classList.remove('border-rose-500', 'text-white');
                card.classList.add('border-transparent', 'text-slate-400');
            });
            const activeCard = document.getElementById(`btn-${type}`);
            if (activeCard) {
                activeCard.classList.remove('border-transparent', 'text-slate-400');
                activeCard.classList.add('border-rose-500', 'text-white');
            }
        }

        // --- 多人連線模式切換 ---
        function setOnlineMode(online) {
            isOnline = online;
            const btnOff = document.getElementById('btn-offline');
            const btnOn = document.getElementById('btn-online');
            const settings = document.getElementById('online-settings');
            if (online) {
                btnOff.className = 'px-6 py-2 bg-slate-800 text-slate-400 font-bold rounded-full text-sm transition-all border-2 border-transparent';
                btnOn.className = 'px-6 py-2 bg-rose-500 text-white font-bold rounded-full text-sm transition-all border-2 border-rose-500';
                settings.classList.add('show');
            } else {
                btnOff.className = 'px-6 py-2 bg-rose-500 text-white font-bold rounded-full text-sm transition-all border-2 border-rose-500';
                btnOn.className = 'px-6 py-2 bg-slate-800 text-slate-400 font-bold rounded-full text-sm transition-all border-2 border-transparent';
                settings.classList.remove('show');
                if (socket && socket.connected) {
                    disconnectFromServer();
                }
            }
        }

        // --- SOCKET.IO 連線函數 ---
        function connectToServer(url) {
            if (socket && socket.connected) return;
            if (!url) url = SERVER_URL;
            if (!url.startsWith('http')) url = 'http://' + url;
            SERVER_URL = url;
            myNickname = document.getElementById('nickname-input').value || '玩家';
            try {
                socket = io(SERVER_URL, {
                    transports: ['websocket', 'polling'],
                    reconnection: true,
                    reconnectionAttempts: 5,
                    reconnectionDelay: 2000
                });
                socket.on('connect', () => {
                    myPlayerId = socket.id;
                    setConnectionStatus('connected');
                    document.getElementById('btn-disconnect').classList.remove('hidden');
                });
                socket.on('disconnect', () => {
                    setConnectionStatus('disconnected');
                    document.getElementById('btn-disconnect').classList.add('hidden');
                    socket = null;
                    isOnline = false;
                    myPlayerId = null;
                    roomPlayers = [];
                    remotePlayers = {};
                });
                socket.on('connect_error', (err) => {
                    console.error('連線錯誤:', err.message);
                    setConnectionStatus('disconnected');
                    document.getElementById('btn-disconnect').classList.add('hidden');
                });
                // 伺服器業務錯誤（密碼錯誤等）
                socket.on('error', (data) => {
                    alert(data.message || '發生錯誤');
                    setConnectionStatus('disconnected');
                });
                // 成功加入房間
                socket.on('room_joined', (data) => {
                    myPlayerId = data.playerId;
                    roomPlayers = data.players || [];
                    isRoomHost = (roomPlayers.length > 0 && roomPlayers[0].id === myPlayerId);
                    setConnectionStatus('in_room');
                    updateRoomPlayerList();
                });
                // 其他玩家加入
                socket.on('player_joined', (data) => {
                    if (data.id && !roomPlayers.find(p => p.id === data.id)) {
                        roomPlayers.push({ id: data.id, name: data.name || '未知', classType: data.classType, team: data.team });
                    }
                    updateRoomPlayerList();
                });
                // 其他玩家離開
                socket.on('player_left', (data) => {
                    roomPlayers = roomPlayers.filter(p => p.id !== data.id);
                    delete remotePlayers[data.id];
                    updateRoomPlayerList();
                });
                // 遊戲開始倒數
                socket.on('game_start', (data) => {
                    setConnectionStatus('playing');
                    if (data.countdown) {
                        // 在多人模式中，收到 game_start 後啟動遊戲
                        if (isOnline) {
                            startGame();
                        }
                        startCountdown(data.countdown);
                    }
                });
                // 遊戲狀態更新 (來自伺服器 GameLoop)
                socket.on('game_state', (data) => {
                    if (!data || !data.entities) return;
                    remotePlayers = {};
                    const playerState = {};
                    data.entities.forEach(ent => {
                        if (ent.id === myPlayerId) {
                            playerState.x = ent.x;
                            playerState.y = ent.y;
                            playerState.hp = ent.hp;
                            playerState.isDead = ent.isDead;
                            playerState.angle = ent.angle;
                        } else {
                            remotePlayers[ent.id] = {
                                id: ent.id,
                                name: ent.name || '未知',
                                classType: ent.classType,
                                team: ent.team,
                                x: ent.x,
                                y: ent.y,
                                angle: ent.angle,
                                hp: ent.hp,
                                isDead: ent.isDead,
                                vx: ent.vx,
                                vy: ent.vy
                            };
                        }
                    });
                    if (player && playerState.x !== undefined) {
                        player.x = playerState.x;
                        player.y = playerState.y;
                        player.hp = playerState.hp;
                        player.isDead = playerState.isDead;
                        player.angle = playerState.angle;
                    }
                    if (data.gameTime !== undefined) {
                        gameTime = data.gameTime;
                        updateTimerUI();
                    }
                    if (data.scores) {
                        scorePercent = data.scores;
                    }
                });
                // 子彈生成 (繪製用)
                socket.on('bullet_spawn', (data) => {
                    // 伺服器子彈由伺服器模擬，客戶端可選用伺服器子彈或自己產生視覺
                });
                // 遊戲結束
                socket.on('game_over', (data) => {
                    if (data.winner) {
                        const title = document.getElementById('result-title');
                        if (title) {
                            if (data.winner === 'red') { title.innerText = 'VICTORY !!'; title.className = 'text-5xl font-black tracking-widest text-emerald-400 animate-pulse'; }
                            else if (data.winner === 'blue') { title.innerText = 'DEFEAT...'; title.className = 'text-5xl font-black tracking-widest text-rose-500'; }
                            else { title.innerText = 'DRAW'; title.className = 'text-5xl font-black tracking-widest text-yellow-400'; }
                        }
                    }
                    endGame();
                });
            } catch (e) {
                console.error('無法建立連線:', e);
                setConnectionStatus('disconnected');
            }
        }

        function disconnectFromServer() {
            if (socket) {
                socket.disconnect();
                socket = null;
            }
            isOnline = false;
            isRoomHost = false;
            myPlayerId = null;
            remotePlayers = {};
            roomPlayers = [];
            setConnectionStatus('disconnected');
            document.getElementById('btn-disconnect').classList.add('hidden');
        }

        function setConnectionStatus(status) {
            const el = document.getElementById('connection-status');
            if (!el) return;
            if (status === 'connected') {
                el.innerText = '已連線';
                el.className = 'text-emerald-400 font-bold';
            } else if (status === 'in_room') {
                el.innerText = '已加入房間';
                el.className = 'text-cyan-400 font-bold';
            } else if (status === 'playing') {
                el.innerText = '遊戲中';
                el.className = 'text-yellow-400 font-bold';
            } else {
                el.innerText = '已離線';
                el.className = 'text-slate-500 font-bold';
            }
        }

        function createRoom() {
            if (!socket || !socket.connected) {
                const url = document.getElementById('server-url-input').value || 'localhost:3000';
                connectToServer(url);
            }
            const roomId = document.getElementById('room-id-input').value || '';
            const password = document.getElementById('room-pwd-input')?.value || '';
            myNickname = document.getElementById('nickname-input').value || '玩家';
            setTimeout(() => {
                if (socket && socket.connected) {
                    socket.emit('join_room', {
                        roomId: roomId,
                        playerName: myNickname,
                        classType: selectedClassType || 'rifle',
                        password: password
                    });
                }
            }, 500);
        }

        function joinRoom() {
            createRoom(); // 與創建房間相同 API，伺服器若無此 ID 會自動建立
        }

        function updateRoomPlayerList() {
            const el = document.getElementById('top-bar-content');
            if (!el || !isOnline) return;
            let html = '<div class="flex items-center gap-2 text-xs">';
            html += '<span class="text-slate-400">👥 房間：</span>';
            roomPlayers.forEach(p => {
                const isMe = p.id === myPlayerId;
                html += '<span class="' + (isMe ? 'text-rose-400 font-bold' : 'text-slate-200') + '">' + (isMe ? '👑 ' : '') + (p.nickname || p.name || '未知') + '</span>';
                html += '<span class="text-slate-600">|</span>';
            });
            html += '<span class="text-slate-500">共 ' + roomPlayers.length + ' 人</span>';
            html += '</div>';
            el.innerHTML = html;
        }

        function startCountdown(seconds) {
            const overlay = document.getElementById('countdown-overlay');
            const textEl = document.getElementById('countdown-text');
            if (!overlay || !textEl) return;
            const steps = seconds || [3,2,1,'GO!'];
            let idx = 0;
            overlay.classList.add('show');
            const showNext = () => {
                if (idx >= steps.length) {
                    overlay.classList.remove('show');
                    return;
                }
                textEl.innerText = steps[idx];
                textEl.style.animation = 'none';
                void textEl.offsetWidth;
                textEl.style.animation = 'countPop 0.8s ease-out forwards';
                idx++;
                setTimeout(showNext, 900);
            };
            showNext();
        }

        // --- 開始比賽 ---
        function startGame() {
            initAudio();
            isPaused = false;

            const lobby = document.getElementById('lobby-screen');
            if (lobby) {
                lobby.style.opacity = '0';
                setTimeout(() => {
                    lobby.style.display = 'none';
                }, 300);
            }

            const skillLabel = document.getElementById('skill-btn-name');
            if (skillLabel) {
                skillLabel.innerText = CLASS_PROFILES[selectedClassType].skillName;
            }

            gameState = 'playing';
            stats = { kills: 0, deaths: 0 };
            bullets = [];
            particles = [];
            missiles = [];
            beams = [];

            initObstacles();
            initInkGrid(); 
            initInkCanvas(); 
            rebuildTopBarUI();

            entities = [];
            const classesList = ['rifle', 'tank', 'sniper', 'knife'];

            if (isOnline) {
                // 多人模式：不建立 bot entities，等待伺服器發送 game_state
                player = new Character(150, 150, 'red', selectedClassType, false, myNickname || '玩家您');
                entities.push(player);
                // 透過 socket 告知伺服器玩家已就緒
                if (socket && socket.connected) {
                    socket.emit('player_ready', {
                        nickname: myNickname || document.getElementById('nickname-input').value || '玩家',
                        classType: selectedClassType
                    });
                }
            } else if (currentMode === 'quad') {
                // 【四隊割據 2vs2vs2vs2】
                player = new Character(150, 150, 'red', selectedClassType, false, "玩家您");
                const redAlly = new Character(130, 200, 'red', classesList.filter(c => c !== selectedClassType)[Math.floor(Math.random()*3)], true, "紅隊盟友");
                entities.push(player, redAlly);

                entities.push(
                    new Character(WORLD_WIDTH - 150, 150, 'blue', 'rifle', true, "藍隊精英A"),
                    new Character(WORLD_WIDTH - 130, 200, 'blue', 'knife', true, "藍隊精英B")
                );

                entities.push(
                    new Character(150, WORLD_HEIGHT - 150, 'green', 'tank', true, "綠隊重裝A"),
                    new Character(130, WORLD_HEIGHT - 200, 'green', 'sniper', true, "綠隊幽靈B")
                );

                entities.push(
                    new Character(WORLD_WIDTH - 150, WORLD_HEIGHT - 150, 'yellow', 'knife', true, "黃隊神速A"),
                    new Character(WORLD_WIDTH - 130, WORLD_HEIGHT - 200, 'yellow', 'rifle', true, "黃隊尖兵B")
                );
            } 
            else {
                player = new Character(150, WORLD_HEIGHT / 2, 'red', selectedClassType, false, "玩家您");
                entities.push(player);

                let teamSize = 2; 
                if (currentMode === '3v3') teamSize = 3;
                if (currentMode === '4v4') teamSize = 4;

                for (let i = 1; i < teamSize; i++) {
                    const botClass = classesList[(classesList.indexOf(selectedClassType) + i) % 4];
                    entities.push(new Character(120, WORLD_HEIGHT / 2 - 120 + i*80, 'red', botClass, true, `紅隊隊友 ${i}`));
                }

                for (let i = 0; i < teamSize; i++) {
                    const botClass = classesList[i % 4];
                    entities.push(new Character(WORLD_WIDTH - 150, WORLD_HEIGHT / 2 - 120 + i*80, 'blue', botClass, true, `藍隊對手 ${i + 1}`));
                }
            }

            // 初始化座標歷史記錄
            entities.forEach(ent => {
                ent.lastX = ent.x;
                ent.lastY = ent.y;
            });

            gameTime = 180; 
            updateTimerUI();

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (isPaused) return; 
                gameTime--;
                updateTimerUI();
                if (gameTime <= 0) {
                    endGame();
                }
            }, 1000);

            if (scoreUpdateInterval) clearInterval(scoreUpdateInterval);
            scoreUpdateInterval = setInterval(calculateScores, 500);

            requestAnimationFrame(updateGame);
        }

        function updateTimerUI() {
            const min = Math.floor(gameTime / 60).toString().padStart(2, '0');
            const sec = (gameTime % 60).toString().padStart(2, '0');
            const timerEls = document.querySelectorAll('#game-timer');
            timerEls.forEach(el => {
                el.innerText = `${min}:${sec}`;
            });
        }

        function endGame() {
            gameState = 'gameover';
            clearInterval(timerInterval);
            clearInterval(scoreUpdateInterval);

            calculateScores();

            const board = document.getElementById('final-scoreboard-container');
            if (board) {
                if (currentMode === 'quad') {
                    const arr = [
                        { team: 'red', val: parseFloat(scorePercent.red), color: 'text-rose-400', name: '紅隊 (我方)' },
                        { team: 'blue', val: parseFloat(scorePercent.blue), color: 'text-cyan-400', name: '藍隊 (右上)' },
                        { team: 'green', val: parseFloat(scorePercent.green), color: 'text-emerald-400', name: '綠隊 (左下)' },
                        { team: 'yellow', val: parseFloat(scorePercent.yellow), color: 'text-amber-400', name: '黃隊 (右下)' }
                    ].sort((a,b) => b.val - a.val);

                    board.innerHTML = `
                        <h3 class="text-white text-lg font-bold mb-3 border-b border-slate-800 pb-2">四隊割據終局排名</h3>
                        <div class="space-y-3">
                            ${arr.map((item, index) => `
                                <div class="flex justify-between items-center text-sm">
                                    <span class="font-bold flex items-center">
                                        <span class="w-5 h-5 rounded-full flex items-center justify-center bg-slate-800 text-[10px] mr-2">${index+1}</span>
                                        <span class="${item.color}">${item.name}</span>
                                    </span>
                                    <span class="font-black text-white">${item.val}%</span>
                                </div>
                            `).join('')}
                        </div>
                    `;

                    const title = document.getElementById('result-title');
                    if (title) {
                        if (arr[0].team === 'red') {
                            title.innerText = "VICTORY !!";
                            title.className = "text-5xl font-black tracking-widest text-emerald-400 animate-pulse";
                        } else {
                            title.innerText = "DEFEAT...";
                            title.className = "text-5xl font-black tracking-widest text-rose-500";
                        }
                    }
                } else {
                    board.innerHTML = `
                        <div class="w-full bg-slate-800 h-8 rounded-full overflow-hidden flex shadow-inner mb-4">
                            <div class="bg-rose-500 h-full" style="width: ${scorePercent.red}%"></div>
                            <div class="bg-cyan-500 h-full" style="width: ${scorePercent.blue}%"></div>
                        </div>
                        <div class="flex justify-between items-center text-white">
                            <div class="flex flex-col">
                                <span class="text-sm text-rose-400 font-bold">我方紅隊</span>
                                <span class="text-3xl font-black text-rose-500">${scorePercent.red}%</span>
                            </div>
                            <div class="text-xl font-bold text-slate-500">VS</div>
                            <div class="flex flex-col text-right">
                                <span class="text-sm text-cyan-400 font-bold">敵方藍隊</span>
                                <span class="text-3xl font-black text-cyan-500">${scorePercent.blue}%</span>
                            </div>
                        </div>
                    `;

                    const title = document.getElementById('result-title');
                    if (title) {
                        if (parseFloat(scorePercent.red) > parseFloat(scorePercent.blue)) {
                            title.innerText = "VICTORY !!";
                            title.className = "text-5xl font-black tracking-widest text-emerald-400 animate-pulse";
                        } else {
                            title.innerText = "DEFEAT...";
                            title.className = "text-5xl font-black tracking-widest text-rose-500";
                        }
                    }
                }
            }

            document.getElementById('stat-kills').innerText = stats.kills;
            document.getElementById('stat-deaths').innerText = stats.deaths;

            const goScreen = document.getElementById('gameover-screen');
            if (goScreen) {
                goScreen.classList.remove('hidden');
                goScreen.classList.add('flex');
            }
        }

        function resetToLobby() {
            const goScreen = document.getElementById('gameover-screen');
            if (goScreen) {
                goScreen.classList.remove('flex');
                goScreen.classList.add('hidden');
            }
            const lobby = document.getElementById('lobby-screen');
            if (lobby) {
                lobby.style.display = 'flex';
                setTimeout(() => {
                    lobby.style.opacity = '1';
                }, 50);
            }
            gameState = 'lobby';
        }

        // --- 特技按鈕冷卻渲染 ---
        function updateSkillButtonUI() {
            const overlay = document.getElementById('skill-cooldown-overlay');
            if (!overlay) return;

            if (player && player.skillCooldown > 0) {
                overlay.style.display = 'flex';
                overlay.innerText = `${Math.ceil(player.skillCooldown / 60)}s`;
            } else {
                overlay.style.display = 'none';
            }
        }

        function setupSkillButton() {
            const btn = document.getElementById('btn-special');
            if (!btn) return;
            
            const triggerSkill = (e) => {
                e.stopPropagation();
                if (player && !player.isDead && gameState === 'playing' && !isPaused) {
                    player.useSpecialSkill();
                }
            };
            btn.addEventListener('touchstart', triggerSkill, { passive: false });
            btn.addEventListener('click', triggerSkill);
        }

        // --- 安全加載入口 ---
        window.onload = function() {
            canvas = document.getElementById('gameCanvas');
            if (!canvas) return;
            ctx = canvas.getContext('2d');
            
            inkCanvas = document.createElement('canvas');
            inkCanvas.width = WORLD_WIDTH;
            inkCanvas.height = WORLD_HEIGHT;
            inkCtx = inkCanvas.getContext('2d');

            obstacles = [];
            entities = [];
            bullets = [];
            particles = [];
            grenades = [];
            beams = [];
            missiles = [];
            initInkGrid();

            sticks.left.element = document.getElementById('joystick-left');
            sticks.right.element = document.getElementById('joystick-right');

            setupTouchControls();
            setupDesktopControls();
            setupSkillButton(); 

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            initObstacles();
            initInkCanvas();
            drawScene();

            document.addEventListener('gesturestart', function (e) {
                if (e.cancelable) e.preventDefault();
            });
        };
    </script>
</body>
</html>
